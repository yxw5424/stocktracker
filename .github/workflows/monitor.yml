name: stock-monitor

on:
  schedule:
    # cron 为 UTC 时间。A股 09:30–15:00(UTC+8)= 01:30–07:00 UTC,周一至周五。
    # 每 15 分钟跑一次;脚本内部再按"自适应节奏"决定是否真正推送告警。
    # 注意:GitHub Actions 定时是尽力而为,可能延迟几分钟;仓库 60 天无活动会自动暂停。
    - cron: "*/15 1-7 * * 1-5"
  workflow_dispatch: {}   # 允许在 Actions 页面手动触发

permissions:
  contents: write          # 需要把更新后的 docs/data 提交回仓库

concurrency:
  group: stock-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run analyzer
        env:
          # 在 仓库 Settings → Secrets and variables → Actions 里配置你需要的渠道;
          # 没配的渠道会自动跳过,网站照常更新。
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          BARK_URL: ${{ secrets.BARK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: python -m analyzer.run

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git diff --staged --quiet || git commit -m "data: update $(date -u +%FT%TZ)"
          git push
